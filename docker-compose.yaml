services:
  sql-server:
    image: mcr.microsoft.com/mssql/server
    container_name: sql-server
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: "StandardDeveloper"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $MSSQL_SA_PASSWORD -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend/ScanityCheck.Api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sql-server;Database=ScanityCheckDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ScanityCheck
      Jwt__Audience: ScanityCheckUsers
      Jwt__ExpiryMinutes: 120
      ZapSettings__Mode: ${ZAP_MODE}
      ZapSettings__ReportsFolder: /app/reports/zap
    volumes:
      - ./backend/ScanityCheck.Api:/app
      - /app/bin
      - /app/obj
      - ./reports:/app/reports
    depends_on:
      sql-server:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mssql_data: